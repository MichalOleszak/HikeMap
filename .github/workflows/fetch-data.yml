name: Refresh hike data

on:
  schedule:
    - cron: '0 2 * * *'  # 02:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh hikes JSON
        env:
          GARMIN_USERNAME: ${{ secrets.GARMIN_USERNAME }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: |
          python scripts/fetch_hike_assets.py --limit 80

      - name: Commit and push if changed
        id: commit
        run: |
          if git diff --quiet public/data; then
            echo "No data changes"
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          git config user.name 'github-actions'
          git config user.email 'github-actions@github.com'
          git add public/data
          git commit -m 'chore: refresh hike data'
          git push
          echo "changed=true" >> $GITHUB_OUTPUT

      - name: Trigger deploy workflow
        if: steps.commit.outputs.changed == 'true'
        uses: peter-evans/workflow-dispatch@v2
        with:
          workflow: Build and deploy site
          ref: main
